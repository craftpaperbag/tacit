<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1b2027" />
  <meta name="description" content="状況の雰囲気と自己主張の度合いを最小の認知負荷で記録するライフログ" />
  <title>Tacit</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <!-- 1. Header -->
    <header class="header">
      <h1 class="brand">Tacit</h1>
      <button id="infoBtn" class="icon-btn" type="button" aria-label="情報" aria-expanded="false">
        <i data-lucide="info"></i>
      </button>
    </header>

    <p id="infoPanel" class="info-panel" hidden>
      グラフ上をタップした瞬間に記録されます。横軸は雰囲気の良し悪し
      （<i data-lucide="frown"></i> 悪い 〜 <i data-lucide="smile"></i> 良い）、
      縦軸は主張の強さ（<i data-lucide="megaphone-off"></i> 抑制 〜
      <i data-lucide="megaphone"></i> 主張）です。メモは履歴から後で追記できます。
      データは端末内にのみ保存されます。
    </p>

    <main>
      <!-- 2. 2D coordinate graph (core) -->
      <section class="graph-section" aria-labelledby="graph-label">
        <div class="section-head">
          <h2 id="graph-label" class="section-title">記録</h2>
          <span class="today-stat" aria-live="polite">
            <i data-lucide="calendar-check"></i>
            今日 <strong id="todayCount">0</strong> 件
          </span>
        </div>

        <div class="graph-wrap">
          <span class="axis-label axis-y-top"><i data-lucide="megaphone"></i>主張</span>
          <span class="axis-label axis-y-bottom"><i data-lucide="megaphone-off"></i>抑制</span>
          <span class="axis-label axis-x-left"><i data-lucide="frown"></i>悪い</span>
          <span class="axis-label axis-x-right"><i data-lucide="smile"></i>良い</span>

          <div id="graph" class="graph" role="application"
               aria-label="2D入力グラフ。タップした位置がその場で記録されます。横軸は雰囲気の良し悪し、縦軸は主張の強さです。">
            <span class="grid-line grid-v"></span>
            <span class="grid-line grid-h"></span>
            <span id="dot" class="dot" hidden></span>
          </div>
        </div>

        <p class="hint">グラフをタップした瞬間に記録されます</p>
      </section>

      <!-- 3. History -->
      <section class="history-section" aria-labelledby="history-label">
        <div class="section-head">
          <h2 id="history-label" class="section-title">履歴</h2>
          <span id="count" class="count">0</span>
        </div>
        <ul id="historyList" class="history-list"></ul>
        <p id="emptyState" class="empty-state">まだ記録がありません。</p>
      </section>

      <!-- 4. Export -->
      <section class="export-section">
        <button id="copyBtn" class="btn btn-ghost" type="button" disabled>
          <i data-lucide="copy"></i><span id="copyLabel">JSONとしてコピー</span>
        </button>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
